name: Release

on:
  push:
    tags:
      - 'v*'

# YEH BLOCK ADD KIYA GAYA HAI FIX KE LIYE
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## AI Repo Manager ${{ github.ref_name }}

            Install the GitHub App: [github.com/apps/ai-repo-manager](https://github.com/apps/ai-repo-manager)

            See [CHANGELOG.md](CHANGELOG.md) for full changes.
