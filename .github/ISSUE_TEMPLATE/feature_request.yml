name: Feature Request
description: Suggest a new feature or improvement
title: "feat: "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: Currently there is no way to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution
      placeholder: Add a /deploy command that...
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Feature type
      options:
        - New slash command
        - New security scanner
        - AI improvement
        - Scheduled task
        - Notification integration
        - Observability
        - Other
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: Estimated effort
      options:
        - Small (few hours)
        - Medium (1-2 days)
        - Large (1+ week)

  - type: checkboxes
    id: contribution
    attributes:
      label: Would you like to contribute this?
      options:
        - label: Yes, I'd like to open a PR for this
